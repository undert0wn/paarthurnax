name: lint

# Catches broken markdown and broken links on every push and PR.
# Both tools are zero-config and run in seconds.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  markdown:
    name: markdown-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lint markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"

  links:
    name: link-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --verbose --exclude-mail "**/*.md"
          fail: true
